name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

# This workflow uses a GitHub App token instead of GITHUB_TOKEN
# because GitHub Actions prevents GITHUB_TOKEN from triggering other workflows.
# GitHub App tokens auto-expire (1h) and provide better security than PAT.
# See: https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          filter: blob:none
          token: ${{ steps.app-token.outputs.token }} # GitHub App token to trigger release workflow

      - name: Install svu
        run: |
          wget -O /tmp/svu.tar.gz https://github.com/caarlos0/svu/releases/download/v2.2.0/svu_2.2.0_linux_amd64.tar.gz
          echo "55bd4579323ec589c1e96d0242295e231c526abb1ae8726945c60385510d96b5  /tmp/svu.tar.gz" | sha256sum -c -
          tar -xzf /tmp/svu.tar.gz -C /tmp
          sudo mv /tmp/svu /usr/local/bin/

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(svu current || echo "v0.0.0")
          NEXT=$(svu next)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT, Next: $NEXT"

      - name: Check if version bump needed
        id: check
        run: |
          if [ "${{ steps.version.outputs.current }}" = "${{ steps.version.outputs.next }}" ]; then
            echo "needs_release=false" >> $GITHUB_OUTPUT
            echo "No version bump needed"
          else
            echo "needs_release=true" >> $GITHUB_OUTPUT
            echo "Version bump: ${{ steps.version.outputs.current }} → ${{ steps.version.outputs.next }}"
          fi

      - name: Sync plugin.json version
        if: steps.check.outputs.needs_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          VERSION_NUM="${VERSION#v}"
          jq --arg v "${VERSION_NUM}" '.version = $v' .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "plugin.json already at ${VERSION_NUM}, skipping commit"
          else
            git commit -m "chore: sync plugin.json to ${VERSION} [skip ci]"
          fi

      - name: Create and push tag
        if: steps.check.outputs.needs_release == 'true'
        run: |
          git tag ${{ steps.version.outputs.next }}
          git push origin main
          git push origin ${{ steps.version.outputs.next }}

      - name: Trigger Release workflow
        if: steps.check.outputs.needs_release == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run release.yaml -f tag=${{ steps.version.outputs.next }}
          echo "Release workflow dispatched for ${{ steps.version.outputs.next }}"
